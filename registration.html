<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farmer AI - Register</title>
  <link rel="stylesheet" href="registration.css" />
</head>
<body>
  <main class="page">
    <section class="register-card">
      <div class="brand">
        <div class="logo">🌱</div>
        <h1>Create Account</h1>
        <p>Register to access your smart farming assistant.</p>
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Enter username" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="Enter email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter password" required />
        </div>

        <div class="form-group">
          <label for="mobile">Mobile Number</label>
          <input type="tel" id="mobile" class="form-control" placeholder="Enter mobile number" required />
        </div>

        <div class="form-group">
          <label for="district">District</label>
          <select id="district" class="form-control" required>
            <option value="">Select District</option>
            <option value="Ahmednagar">Ahmednagar</option>
            <option value="Akola">Akola</option>
            <option value="Amravati">Amravati</option>
            <option value="Aurangabad">Aurangabad</option>
            <option value="Beed">Beed</option>
            <option value="Bhandara">Bhandara</option>
            <option value="Buldhana">Buldhana</option>
            <option value="Chandrapur">Chandrapur</option>
            <option value="Dhule">Dhule</option>
            <option value="Gadchiroli">Gadchiroli</option>
            <option value="Gondia">Gondia</option>
            <option value="Hingoli">Hingoli</option>
            <option value="Jalgaon">Jalgaon</option>
            <option value="Jalna">Jalna</option>
            <option value="Kolhapur">Kolhapur</option>
            <option value="Latur">Latur</option>
            <option value="Mumbai City">Mumbai City</option>
            <option value="Mumbai Suburban">Mumbai Suburban</option>
            <option value="Nagpur">Nagpur</option>
            <option value="Nanded">Nanded</option>
            <option value="Nandurbar">Nandurbar</option>
            <option value="Nashik">Nashik</option>
            <option value="Dharashiv">Dharashiv (Osmanabad)</option>
            <option value="Palghar">Palghar</option>
            <option value="Parbhani">Parbhani</option>
            <option value="Pune">Pune</option>
            <option value="Raigad">Raigad</option>
            <option value="Ratnagiri">Ratnagiri</option>
            <option value="Sangli">Sangli</option>
            <option value="Satara">Satara</option>
            <option value="Sindhudurg">Sindhudurg</option>
            <option value="Solapur">Solapur</option>
            <option value="Thane">Thane</option>
            <option value="Wardha">Wardha</option>
            <option value="Washim">Washim</option>
            <option value="Yavatmal">Yavatmal</option>
          </select>
        </div>

        <div class="form-group">
          <label for="taluka">Taluka</label>
          <select id="taluka" class="form-control" required>
            <option value="">Select Taluka</option>
          </select>
        </div>

        <button type="submit" class="submit">Register</button>
      </form>
    </section>
  </main>

  <script>
    const talukaData = {

      Solapur: ["Solapur North", "Solapur South", "Barshi", "Mohol", "Mangalvedha", "Pandharpur", "Malshiras", "Karmala", "Akkalkot", "Sangola"],
      Wardha: ["Wardha", "Arvi", "Ashti", "Deoli", "Hinganghat", "Karanja", "Samudrapur"],
      Washim: ["Washim", "Malegaon", "Mangrulpir", "Risod", "Karanja", "Manora"],
      Yavatmal: ["Yavatmal", "Arni", "Babulgaon", "Darwha", "Digras", "Ghatanji", "Kalamb", "Mahagaon", "Maregaon", "Ner", "Pusad", "Ralegaon", "Umarkhed", "Wani", "Zari Jamni"]
    };

    const districtSelect = document.getElementById("district");
    const talukaSelect = document.getElementById("taluka");

    districtSelect.addEventListener("change", function () {
      const district = this.value;
      talukaSelect.innerHTML = '<option value="">Select Taluka</option>';
      if (talukaData[district]) {
        talukaData[district].forEach(function (taluka) {
          const option = document.createElement("option");
          option.value = taluka;
          option.textContent = taluka;
          talukaSelect.appendChild(option);
        });
      }
    });

    document.getElementById("registerForm").addEventListener("submit", function (e) {
      e.preventDefault();
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
